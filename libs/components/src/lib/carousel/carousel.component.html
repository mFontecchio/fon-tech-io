<div class="fui-carousel__viewport">
  <div
    #carouselTrack
    class="fui-carousel__track"
    (pointerdown)="handlePointerDown($event)"
  >
    <ng-content />
  </div>

  <div class="fui-carousel__status" [attr.aria-live]="liveRegionMode()" aria-atomic="true">
    {{ statusMessage() }}
  </div>

  @if (showControls() && slideCount() > 1) {
    <button
      type="button"
      class="fui-carousel__control fui-carousel__control--previous"
      [disabled]="!canGoPrevious()"
      [attr.aria-label]="'Previous slide'"
      (click)="goToPrevious()"
    >
      <span aria-hidden="true">&#8249;</span>
    </button>

    <button
      type="button"
      class="fui-carousel__control fui-carousel__control--next"
      [disabled]="!canGoNext()"
      [attr.aria-label]="'Next slide'"
      (click)="goToNext()"
    >
      <span aria-hidden="true">&#8250;</span>
    </button>
  }

  @if (autoplay() && slideCount() > 1) {
    <button
      type="button"
      class="fui-carousel__autoplay-toggle"
      [attr.aria-label]="isPlaying() ? 'Pause automatic slide rotation' : 'Resume automatic slide rotation'"
      [attr.aria-pressed]="!isPlaying()"
      (click)="toggleAutoplay()"
    >
      {{ isPlaying() ? 'Pause' : 'Play' }}
    </button>
  }
</div>

@if (showIndicators() && slideCount() > 1) {
  <div class="fui-carousel__indicators" role="group" aria-label="Choose a slide">
    @for (slide of slides(); track $index) {
      <button
        type="button"
        class="fui-carousel__indicator"
        [class.fui-carousel__indicator--active]="$index === currentIndex()"
        [attr.aria-label]="'Go to slide ' + ($index + 1)"
        [attr.aria-current]="$index === currentIndex() ? 'true' : null"
        (click)="goTo($index)"
      ></button>
    }
  </div>
}

@if (showThumbnails() && slideCount() > 1) {
  <div class="fui-carousel__thumbnails" role="group" aria-label="Slide thumbnails">
    @for (slide of slides(); track $index) {
      <button
        type="button"
        class="fui-carousel__thumbnail"
        [class.fui-carousel__thumbnail--active]="$index === currentIndex()"
        [attr.aria-label]="slide.label() ? 'Go to ' + slide.label() : 'Go to slide ' + ($index + 1)"
        [attr.aria-current]="$index === currentIndex() ? 'true' : null"
        (click)="goTo($index)"
      >
        @if (slide.thumbnail()) {
          <img [src]="slide.thumbnail()" [alt]="slide.thumbnailAlt() || slide.label() || 'Slide ' + ($index + 1)" />
        } @else {
          <span>{{ slide.label() || 'Slide ' + ($index + 1) }}</span>
        }
      </button>
    }
  </div>
}

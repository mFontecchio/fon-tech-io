<div class="fui-accordion-container">
  @for (item of items(); track $index) {
    <div
      class="fui-accordion-item"
      [class.fui-accordion-item--expanded]="isExpanded($index)"
      [class.fui-accordion-item--disabled]="item.disabled()"
    >
      <button
        type="button"
        class="fui-accordion-header"
        [attr.aria-expanded]="isExpanded($index)"
        [attr.aria-controls]="'fui-accordion-panel-' + $index"
        [attr.id]="'fui-accordion-header-' + $index"
        [disabled]="item.disabled()"
        (click)="toggleItem($index)"
      >
        <span class="fui-accordion-title">{{ item.title() }}</span>
        <svg
          class="fui-accordion-icon"
          width="20"
          height="20"
          viewBox="0 0 20 20"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M6 8L10 12L14 8"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>

      <div
        class="fui-accordion-panel"
        [attr.id]="'fui-accordion-panel-' + $index"
        [attr.aria-labelledby]="'fui-accordion-header-' + $index"
        [attr.role]="'region'"
        [hidden]="!isExpanded($index)"
      >
        <div class="fui-accordion-content">
          <div class="fui-accordion-content-body">
            <ng-content></ng-content>
          </div>
        </div>
      </div>
    </div>
  }
</div>

<span 
  [ngClass]="badgeClasses()"
  [attr.aria-label]="computedAriaLabel()"
>
  @if (dot()) {
    <span class="ui-badge-dot" aria-hidden="true"></span>
  }

  @if (icon()) {
    <span class="ui-badge-icon" aria-hidden="true">
      <!-- Icon slot - could be replaced with actual icon component -->
      {{ icon() }}
    </span>
  }

  <span class="ui-badge-content">
    @if (displayCount()) {
      {{ displayCount() }}
    } @else if (label()) {
      {{ label() }}
    } @else {
      <ng-content></ng-content>
    }
  </span>

  @if (dismissible()) {
    <button
      type="button"
      class="ui-badge-dismiss"
      aria-label="Remove"
      (click)="handleDismiss($event)"
    >
      <svg 
        width="12" 
        height="12" 
        viewBox="0 0 12 12" 
        fill="none"
        aria-hidden="true"
      >
        <path 
          d="M9 3L3 9M3 3L9 9" 
          stroke="currentColor" 
          stroke-width="1.5" 
          stroke-linecap="round"
        />
      </svg>
    </button>
  }
</span>

<div class="fui-progress-container">
  @if (label()) {
    <div class="fui-progress-label">
      <span>{{ label() }}</span>
      @if (showValue() && !indeterminate()) {
        <span class="fui-progress-value">{{ displayValue() }}</span>
      }
    </div>
  }

  <div [ngClass]="progressClasses()">
    <div [ngClass]="barClasses()" [style.--fui-progress-width]="barWidth()">
      @if (showValue() && !indeterminate() && !label()) {
        <span class="fui-progress-value-inline">{{ displayValue() }}</span>
      }
    </div>
  </div>
</div>

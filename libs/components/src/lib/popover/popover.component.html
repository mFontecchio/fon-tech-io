<div class="fui-popover-container">
  <!-- Trigger -->
  <button
    type="button"
    class="fui-popover-trigger"
    [attr.aria-haspopup]="true"
    [attr.aria-expanded]="isOpen()"
    [attr.disabled]="disabled() ? true : null"
    (click)="handleTriggerClick()"
    (mouseenter)="handleTriggerMouseEnter()"
    (mouseleave)="handleTriggerMouseLeave()"
  >
    <ng-content select="[trigger]"></ng-content>
  </button>

  <!-- Popover content -->
  <dialog
    [ngClass]="popoverClasses()"
    [attr.open]="isOpen() ? true : null"
    [attr.aria-modal]="false"
    [attr.hidden]="!isOpen() ? true : null"
  >
    @if (showArrow()) {
      <div class="fui-popover-arrow"></div>
    }

    <div class="fui-popover-content-wrapper">
      @if (title()) {
        <div class="fui-popover-header">
          <h3 class="fui-popover-title">{{ title() }}</h3>
          <button
            type="button"
            class="fui-popover-close"
            aria-label="Close popover"
            (click)="close()"
          >
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path
                d="M12 4L4 12M4 4L12 12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      }

      <div class="fui-popover-content">
        <ng-content></ng-content>
      </div>
    </div>
  </dialog>
</div>

<div [ngClass]="tabsClasses()">
  <div class="ui-tabs-list" role="tablist" [attr.aria-orientation]="orientation()">
    @for (tab of tabs(); track $index) {
      <button
        #tabButton
        type="button"
        class="ui-tab-button"
        [class.ui-tab-button--active]="$index === internalActiveIndex()"
        [class.ui-tab-button--disabled]="tab.disabled()"
        [attr.role]="'tab'"
        [attr.aria-selected]="$index === internalActiveIndex()"
        [attr.aria-controls]="'ui-tab-panel-' + $index"
        [attr.id]="'ui-tab-' + $index"
        [attr.tabindex]="$index === internalActiveIndex() ? 0 : -1"
        [disabled]="tab.disabled()"
        (click)="selectTab($index)"
        (keydown)="handleKeyDown($event, $index)"
      >
        @if (tab.icon()) {
          <span class="ui-tab-icon">{{ tab.icon() }}</span>
        }
        <span class="ui-tab-label">{{ tab.label() }}</span>
        @if (tab.badge()) {
          <span class="ui-tab-badge">{{ tab.badge() }}</span>
        }
      </button>
    }
    @if (indicatorSize() > 0) {
      <div
        class="ui-tabs-indicator"
        [style.--ui-tabs-indicator-pos]="indicatorPosition() + 'px'"
        [style.--ui-tabs-indicator-size]="indicatorSize() + 'px'"
      ></div>
    }
  </div>

  <div class="ui-tabs-panels">
    <ng-content></ng-content>
  </div>
</div>

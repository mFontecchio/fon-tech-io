@if (variant() === 'text' && lines() > 1) {
  <div class="fui-skeleton-lines" role="status" aria-label="Loading...">
    @for (line of lineArray(); track line) {
      <div
        [ngClass]="skeletonClasses()"
        [style.--fui-skeleton-height]="height() || null"
        aria-hidden="true"
      ></div>
    }
  </div>
} @else {
  <div class="fui-skeleton-sr-wrapper" role="status" aria-label="Loading...">
    <div
      [ngClass]="skeletonClasses()"
      [style.--fui-skeleton-width]="width() || null"
      [style.--fui-skeleton-height]="height() || null"
      aria-hidden="true"
    ></div>
  </div>
}

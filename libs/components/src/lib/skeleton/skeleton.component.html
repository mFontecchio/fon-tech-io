@if (variant() === 'text' && lines() > 1) {
  <div class="ui-skeleton-lines">
    @for (line of lineArray(); track line) {
      <div 
        [ngClass]="skeletonClasses()"
        [ngStyle]="inlineStyles()"
        [style.width]="line === lines() - 1 ? '80%' : '100%'"
        [attr.aria-hidden]="true"
        role="status"
      ></div>
    }
  </div>
} @else {
  <div 
    [ngClass]="skeletonClasses()"
    [ngStyle]="inlineStyles()"
    [attr.aria-hidden]="true"
    role="status"
  >
    <span class="ui-skeleton-sr-only">Loading...</span>
  </div>
}

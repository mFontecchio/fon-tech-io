<div class="fui-slider-container">
  @if (label()) {
    <label [for]="sliderId()" class="fui-slider-label">
      {{ label() }}
    </label>
  }

  <div class="fui-slider-control">
    <div [ngClass]="sliderClasses()">
      <!-- Visual track -->
      <div class="fui-slider-track">
        @if (isRange()) {
          <div
            class="fui-slider-fill fui-slider-fill--range"
            [style.--fui-slider-range-left]="rangeFillLeft()"
            [style.--fui-slider-range-width]="rangeFillWidth()"
          ></div>
        } @else {
          <div class="fui-slider-fill" [style.--fui-slider-fill]="fillPercentage() + '%'"></div>
        }
      </div>

      <!-- Single handle or start handle -->
      <input
        type="range"
        class="fui-slider-input"
        [class.fui-slider-input--start]="isRange()"
        [class.fui-slider-input--active]="activeHandle() === 'start'"
        [id]="sliderId()"
        [name]="name()"
        [min]="min()"
        [max]="max()"
        [step]="step()"
        [value]="internalValue()"
        [disabled]="disabled()"
        [attr.aria-label]="ariaLabel() || label() || 'Slider'"
        [attr.aria-valuemin]="min()"
        [attr.aria-valuemax]="max()"
        [attr.aria-valuenow]="internalValue()"
        (input)="handleValueChange(+$any($event.target).value)"
        (mousedown)="onStartHandleMouseDown($event)"
        (touchstart)="onStartHandleMouseDown($event)"
      />

      <!-- End handle (for range mode) -->
      @if (isRange()) {
        <input
          type="range"
          class="fui-slider-input fui-slider-input--end"
          [class.fui-slider-input--active]="activeHandle() === 'end'"
          [min]="min()"
          [max]="max()"
          [step]="step()"
          [value]="internalValueEnd()"
          [disabled]="disabled()"
          [attr.aria-label]="(ariaLabel() || label() || 'Slider') + ' end'"
          [attr.aria-valuemin]="min()"
          [attr.aria-valuemax]="max()"
          [attr.aria-valuenow]="internalValueEnd()"
          (input)="handleValueEndChange(+$any($event.target).value)"
          (mousedown)="onEndHandleMouseDown($event)"
          (touchstart)="onEndHandleMouseDown($event)"
        />
      }
    </div>

    @if (showMinMax() || showValue()) {
      <div class="fui-slider-labels">
        @if (showMinMax()) {
          <span class="fui-slider-label-min">{{ min() }}</span>
        }
        @if (showValue()) {
          <span class="fui-slider-value">
            @if (isRange()) {
              {{ internalValue() }} - {{ internalValueEnd() }}
            } @else {
              {{ internalValue() }}
            }
          </span>
        }
        @if (showMinMax()) {
          <span class="fui-slider-label-max">{{ max() }}</span>
        }
      </div>
    }
  </div>
</div>

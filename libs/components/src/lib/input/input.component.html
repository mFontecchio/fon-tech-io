<div class="fui-input-container">
  @if (label()) {
    <label
      [for]="inputId()"
      class="fui-input-label"
      [class.fui-input-label--required]="required()"
      [class.fui-input-label--disabled]="disabled()"
    >
      {{ label() }}
      @if (required()) {
        <span class="fui-input-required-indicator" aria-label="required">*</span>
      }
    </label>
  }

  <div
    class="fui-input-field-wrapper"
    [class.fui-input-field-wrapper--focused]="isFocused()"
    [class.fui-input-field-wrapper--error]="hasError()"
    [class.fui-input-field-wrapper--disabled]="isDisabled()"
    [class.fui-input-field-wrapper--with-action]="shouldShowPasswordToggle()"
  >
    <div class="fui-input-prefix">
      @if (prefixIcon()) {
        <span class="fui-input-icon" aria-hidden="true">{{ prefixIcon() }}</span>
      }
      <ng-content select="[prefix]" />
    </div>

    <input
      #input
      [type]="resolvedInputType()"
      [id]="inputId()"
      [name]="name()"
      [value]="internalValue()"
      [placeholder]="placeholder()"
      [disabled]="isDisabled()"
      [readonly]="readonly()"
      [required]="required()"
      [attr.maxlength]="maxLength()"
      [attr.minlength]="minLength()"
      [attr.pattern]="pattern()"
      [attr.autocomplete]="autocomplete()"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="computedAriaDescribedBy()"
      [attr.aria-invalid]="hasError()"
      [attr.aria-required]="required()"
      [ngClass]="inputClasses()"
      (input)="handleInput($event)"
      (focus)="handleFocus($event)"
      (blur)="handleBlur($event)"
    />

    <div class="fui-input-suffix">
      @if (suffixIcon()) {
        <span class="fui-input-icon" aria-hidden="true">{{ suffixIcon() }}</span>
      }
      <ng-content select="[suffix]" />

      @if (shouldShowPasswordToggle()) {
        <button
          type="button"
          class="fui-input-affix-action fui-input-password-toggle"
          [disabled]="isDisabled()"
          [attr.aria-label]="passwordToggleLabel()"
          [attr.aria-pressed]="isPasswordVisible()"
          (click)="togglePasswordVisibility()"
        >
          {{ isPasswordVisible() ? 'Hide' : 'Show' }}
        </button>
      }
    </div>
  </div>

  @if (helperText() && !hasError()) {
    <div [id]="helperTextId()" class="fui-input-helper-text">
      {{ helperText() }}
    </div>
  }

  @if (hasError()) {
    <div [id]="errorId()" class="fui-input-error-message" role="alert" aria-live="polite">
      {{ displayedErrorMessage() }}
    </div>
  }
</div>

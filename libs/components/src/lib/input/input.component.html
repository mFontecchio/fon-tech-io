<div class="ui-input-container">
  @if (label()) {
    <label 
      [for]="inputId()" 
      class="ui-input-label"
      [class.ui-input-label--required]="required()"
      [class.ui-input-label--disabled]="disabled()"
    >
      {{ label() }}
      @if (required()) {
        <span class="ui-input-required-indicator" aria-label="required">*</span>
      }
    </label>
  }

  <div
    class="ui-input-field-wrapper"
    [class.ui-input-field-wrapper--focused]="isFocused()"
    [class.ui-input-field-wrapper--error]="hasError()"
    [class.ui-input-field-wrapper--disabled]="disabled()"
    [class.ui-input-field-wrapper--with-action]="shouldShowPasswordToggle()"
  >
    <div class="ui-input-prefix">@if (prefixIcon()) {
      <span class="ui-input-icon" aria-hidden="true">{{ prefixIcon() }}</span>
    }<ng-content select="[prefix]" /></div>
    
    <input
      #input
      [type]="resolvedInputType()"
      [id]="inputId()"
      [name]="name()"
      [value]="internalValue()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [required]="required()"
      [attr.maxlength]="maxLength()"
      [attr.minlength]="minLength()"
      [attr.pattern]="pattern()"
      [attr.autocomplete]="autocomplete()"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="computedAriaDescribedBy()"
      [attr.aria-invalid]="hasError()"
      [attr.aria-required]="required()"
      [ngClass]="inputClasses()"
      (input)="handleInput($event)"
      (focus)="handleFocus($event)"
      (blur)="handleBlur($event)"
    />
    
    <div class="ui-input-suffix">@if (suffixIcon()) {
      <span class="ui-input-icon" aria-hidden="true">{{ suffixIcon() }}</span>
    }<ng-content select="[suffix]" />

    @if (shouldShowPasswordToggle()) {
      <button
        type="button"
        class="ui-input-affix-action ui-input-password-toggle"
        [disabled]="disabled()"
        [attr.aria-label]="passwordToggleLabel()"
        [attr.aria-pressed]="isPasswordVisible()"
        (click)="togglePasswordVisibility()"
      >
        {{ isPasswordVisible() ? 'Hide' : 'Show' }}
      </button>
    }</div>
  </div>

  @if (helperText() && !hasError()) {
    <div 
      [id]="helperTextId()" 
      class="ui-input-helper-text"
    >
      {{ helperText() }}
    </div>
  }

  @if (hasError()) {
    <div 
      [id]="errorId()" 
      class="ui-input-error-message"
      role="alert"
      aria-live="polite"
    >
      {{ displayedErrorMessage() }}
    </div>
  }
</div>

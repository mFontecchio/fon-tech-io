<div class="fui-switch-container">
  <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
  <label [for]="switchId()" class="fui-switch-label" (click)="handleLabelClick($event)">
    <input
      #switch
      type="checkbox"
      role="switch"
      [id]="switchId()"
      [name]="name()"
      [checked]="internalChecked()"
      [disabled]="disabled()"
      [required]="required()"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="computedAriaDescribedBy()"
      [attr.aria-invalid]="hasError()"
      [attr.aria-required]="required()"
      [attr.aria-checked]="internalChecked()"
      [ngClass]="switchClasses()"
      (change)="handleChange($event)"
    />

    <span class="fui-switch-track">
      <span class="fui-switch-thumb">
        @if (showLabels()) {
          <span class="fui-switch-thumb-label">
            {{ internalChecked() ? onLabel() : offLabel() }}
          </span>
        }
      </span>
    </span>

    @if (label()) {
      <span class="fui-switch-label-text">
        {{ label() }}
        @if (required()) {
          <span class="fui-switch-required-indicator" aria-label="required">*</span>
        }
      </span>
    }
  </label>

  @if (helperText() && !hasError()) {
    <div [id]="helperTextId()" class="fui-switch-helper-text">
      {{ helperText() }}
    </div>
  }

  @if (hasError()) {
    <div [id]="errorId()" class="fui-switch-error-message" role="alert" aria-live="polite">
      {{ errorMessage() }}
    </div>
  }
</div>

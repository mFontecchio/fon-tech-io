<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<dialog
  #dialog
  class="fui-drawer-dialog"
  [class.fui-drawer-dialog--no-backdrop]="!showBackdrop()"
  [attr.aria-labelledby]="title() ? 'fui-drawer-title' : null"
  [attr.aria-label]="!title() ? 'Drawer' : null"
  (click)="handleBackdropClick($event)"
  (cancel)="handleCancel($event)"
>
  <!-- Drawer panel -->
  <div [ngClass]="drawerClasses()">
    <!-- Header -->
    @if (title()) {
      <div class="fui-drawer-header">
        <h2 class="fui-drawer-title" id="fui-drawer-title">{{ title() }}</h2>
        <button type="button" class="fui-drawer-close" aria-label="Close drawer" (click)="close()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M18 6L6 18M6 6L18 18"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>
    } @else {
      <button
        type="button"
        class="fui-drawer-close fui-drawer-close--absolute"
        aria-label="Close drawer"
        (click)="close()"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M18 6L6 18M6 6L18 18"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </button>
    }

    <!-- Content -->
    <div class="fui-drawer-content">
      <ng-content></ng-content>
    </div>

    <!-- Footer (optional slot) -->
    <div class="fui-drawer-footer">
      <ng-content select="[footer]"></ng-content>
    </div>
  </div>
</dialog>

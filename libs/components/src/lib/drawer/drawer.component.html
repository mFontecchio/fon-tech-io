@if (isOpen()) {
  <div class="ui-drawer-container">
    <!-- Backdrop -->
    @if (showBackdrop()) {
      <div 
        class="ui-drawer-backdrop"
        [class.ui-drawer-backdrop--visible]="isOpen()"
        (click)="handleBackdropClick()"
        [attr.aria-hidden]="true"
      ></div>
    }

    <!-- Drawer panel -->
    <div
      [ngClass]="drawerClasses()"
      [attr.role]="'dialog'"
      [attr.aria-modal]="true"
      [attr.aria-label]="title() || 'Drawer'"
    >
      <!-- Header -->
      @if (title()) {
        <div class="ui-drawer-header">
          <h2 class="ui-drawer-title">{{ title() }}</h2>
          <button
            type="button"
            class="ui-drawer-close"
            aria-label="Close drawer"
            (click)="close()"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      } @else {
        <button
          type="button"
          class="ui-drawer-close ui-drawer-close--absolute"
          aria-label="Close drawer"
          (click)="close()"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      }

      <!-- Content -->
      <div class="ui-drawer-content">
        <ng-content></ng-content>
      </div>

      <!-- Footer (optional slot) -->
      <div class="ui-drawer-footer">
        <ng-content select="[footer]"></ng-content>
      </div>
    </div>
  </div>
}

<div class="fui-select-container">
  @if (label()) {
    <label [for]="selectId()" class="fui-select-label">
      {{ label() }}
      @if (required()) {
        <span class="fui-select-required-indicator" aria-label="required">*</span>
      }
    </label>
  }

  <div class="fui-select-input-wrapper">
    <select
      #select
      [id]="selectId()"
      [name]="name()"
      [disabled]="disabled()"
      [required]="required()"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="computedAriaDescribedBy()"
      [attr.aria-invalid]="hasError()"
      [attr.aria-required]="required()"
      [ngClass]="selectClasses()"
      [value]="internalValue() || ''"
      (change)="handleChange($event)"
    >
      <option value="" disabled [selected]="!internalValue()">
        {{ placeholder() }}
      </option>

      @if (!hasGroups()) {
        @for (option of options(); track option.value) {
          <option 
            [value]="option.value"
            [disabled]="option.disabled || false"
            [selected]="internalValue() === option.value"
          >
            {{ option.label }}
          </option>
        }
      } @else {
        @for (group of groupedOptions() | keyvalue; track group.key) {
          @if (group.key) {
            <optgroup [label]="group.key">
              @for (option of group.value; track option.value) {
                <option 
                  [value]="option.value"
                  [disabled]="option.disabled || false"
                  [selected]="internalValue() === option.value"
                >
                  {{ option.label }}
                </option>
              }
            </optgroup>
          } @else {
            @for (option of group.value; track option.value) {
              <option 
                [value]="option.value"
                [disabled]="option.disabled || false"
                [selected]="internalValue() === option.value"
              >
                {{ option.label }}
              </option>
            }
          }
        }
      }
    </select>

    <svg 
      class="fui-select-icon" 
      width="20" 
      height="20" 
      viewBox="0 0 20 20" 
      fill="none"
      aria-hidden="true"
    >
      <path 
        d="M6 8L10 12L14 8" 
        stroke="currentColor" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round"
      />
    </svg>
  </div>

  @if (helperText() && !hasError()) {
    <div 
      [id]="helperTextId()" 
      class="fui-select-helper-text"
    >
      {{ helperText() }}
    </div>
  }

  @if (hasError()) {
    <div 
      [id]="errorId()" 
      class="fui-select-error-message"
      role="alert"
      aria-live="polite"
    >
      {{ errorMessage() }}
    </div>
  }
</div>

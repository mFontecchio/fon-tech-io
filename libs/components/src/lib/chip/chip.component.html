<div 
  [ngClass]="chipClasses()"
  [attr.role]="clickable() ? 'button' : undefined"
  [attr.tabindex]="clickable() && !disabled() ? 0 : undefined"
  [attr.aria-label]="ariaLabel() || label()"
  [attr.aria-disabled]="disabled()"
  (click)="handleClick()"
  (keydown.enter)="handleClick()"
  (keydown.space)="$event.preventDefault(); handleClick()"
>
  @if (avatar()) {
    <span class="fui-chip-avatar">{{ avatar() }}</span>
  }

  <span class="fui-chip-label">{{ label() }}</span>

  @if (removable()) {
    <button
      type="button"
      class="fui-chip-remove"
      [attr.aria-label]="'Remove ' + label()"
      [disabled]="disabled()"
      (click)="handleRemove($event)"
    >
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M10.5 3.5L3.5 10.5M3.5 3.5L10.5 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  }
</div>

<article 
  [ngClass]="cardClasses()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-labelledby]="ariaLabelledBy()"
  role="region"
>
  <div class="fui-card__header">
    <ng-content select="[header]" />
  </div>

  <div class="fui-card__body">
    <ng-content />
  </div>

  <div class="fui-card__footer">
    <ng-content select="[footer]" />
  </div>
</article>

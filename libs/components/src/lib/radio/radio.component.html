<div class="fui-radio-container">
  <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
  <label [for]="radioId()" class="fui-radio-label" (click)="handleLabelClick($event)">
    <input
      #radio
      type="radio"
      [id]="radioId()"
      [name]="name()"
      [value]="value()"
      [checked]="isChecked()"
      [disabled]="isDisabled()"
      [required]="required()"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="computedAriaDescribedBy()"
      [attr.aria-invalid]="hasError()"
      [attr.aria-required]="required()"
      [ngClass]="radioClasses()"
      (change)="handleChange($event)"
      (blur)="handleBlur()"
    />

    <span class="fui-radio-box">
      @if (isChecked()) {
        <span class="fui-radio-dot"></span>
      }
    </span>

    @if (label()) {
      <span class="fui-radio-label-text">
        {{ label() }}
        @if (required()) {
          <span class="fui-radio-required-indicator" aria-label="required">*</span>
        }
      </span>
    }
  </label>

  @if (helperText() && !hasError()) {
    <div [id]="helperTextId()" class="fui-radio-helper-text">
      {{ helperText() }}
    </div>
  }

  @if (hasError()) {
    <div [id]="errorId()" class="fui-radio-error-message" role="alert" aria-live="polite">
      {{ errorMessage() }}
    </div>
  }
</div>

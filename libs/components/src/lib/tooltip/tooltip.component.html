<div class="fui-tooltip-trigger">
  <ng-content></ng-content>

  <div
    [id]="tooltipId"
    [ngClass]="tooltipClasses()"
    role="tooltip"
    [attr.aria-hidden]="!isVisible()"
  >
    <div class="fui-tooltip-content">
      {{ text() }}
    </div>
    <div class="fui-tooltip-arrow"></div>
  </div>
</div>

name: Deploy Showcase to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-showcase
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build Showcase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries in dependency order
        run: |
          pnpm run build:theming
          pnpm run build:shared
          pnpm run build:components
          pnpm run build:theme-builder

      - name: Build showcase for GitHub Pages
        run: pnpm exec nx build showcase --configuration=github-pages

      - name: Add 404.html for SPA deep-link routing
        run: cp dist/apps/showcase/browser/index.html dist/apps/showcase/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/apps/showcase/browser

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

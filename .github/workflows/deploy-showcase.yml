name: Deploy Showcase to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-showcase
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Showcase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries in dependency order
        run: |
          pnpm run build:theming
          pnpm run build:shared
          pnpm run build:components
          pnpm run build:theme-builder

      - name: Build showcase for GitHub Pages
        run: pnpm exec nx build showcase --configuration=github-pages

      - name: Add 404.html for SPA deep-link routing
        run: cp dist/apps/showcase/browser/index.html dist/apps/showcase/browser/404.html

      - name: Deploy to public repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLIC_REPO_DEPLOY_TOKEN }}
          external_repository: mFontecchio/fon-tech-io
          publish_branch: gh-pages
          publish_dir: dist/apps/showcase/browser
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'deploy: showcase @ ${{ github.sha }}'
